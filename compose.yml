services:
  tvm:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ghcr.io/sgtslaughta/telegram_video-matic:latest
    container_name: telegram-video-matic
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./media:/media
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/tvm.sqlite"
      MEDIA_ROOT: "/media"
    # Healthcheck is defined in the image (stdlib, no curl dependency).
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
