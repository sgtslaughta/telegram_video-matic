services:
  tvm:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: ghcr.io/sgtslaughta/telegram_video-matic:latest
    container_name: telegram-video-matic
    restart: unless-stopped
    # Run as the host user that owns ./data and ./media so SQLite can write.
    # Bind mounts carry host ownership and shadow the image's build-time chown.
    # Override via PUID/PGID in .env (Unraid: your share's uid/gid).
    user: "${PUID:-1000}:${PGID:-1000}"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./media:/media
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/tvm.sqlite"
      MEDIA_ROOT: "/media"
    # Healthcheck is defined in the image (stdlib, no curl dependency).
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
