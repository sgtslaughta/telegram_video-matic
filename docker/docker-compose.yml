version: "3.9"

services:
  tvm:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: telegram-video-matic
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
      - ./media:/media
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite+aiosqlite:////data/tvm.sqlite"
      MEDIA_ROOT: "/media"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
