name: CI

on:
  push:
    branches: [main, refactor/v1-rebuild]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Lint + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check app/
      - name: Run tests with pytest
        env:
          TVM_SECRET_KEY: test-key-for-ci
        run: pytest -q tests/

  frontend:
    name: Frontend (Type + Test + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check with tsc
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Run tests with vitest
        working-directory: frontend
        run: npm test -- --run
        continue-on-error: true
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          tags: tvm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke Test (Container Start + Health)
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: tvm:test
      - name: Start container with TVM_SECRET_KEY
        run: |
          docker run -d \
            -e TVM_SECRET_KEY=test-key-for-ci \
            -e TVM_APP_PASSWORD=test \
            -p 8000:8000 \
            --name tvm-test \
            tvm:test
          sleep 5
      - name: Check health endpoint
        run: |
          curl -f http://localhost:8000/api/health || exit 1
      - name: View logs
        if: failure()
        run: docker logs tvm-test
      - name: Cleanup
        if: always()
        run: docker stop tvm-test || true
