name: CI

on:
  push:
    branches: [main, refactor/v1-rebuild]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Lint + Security + Test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint with ruff
        run: ruff check app/
      - name: Security scan with bandit
        run: bandit -r app/ -ll
      - name: Run tests with pytest
        env:
          TVM_SECRET_KEY: test-key-for-ci
        run: pytest -q tests/

  frontend:
    name: Frontend (Type + Test + Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type check with tsc
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Run tests with vitest
        working-directory: frontend
        run: npm test -- --run
        continue-on-error: true
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  security:
    name: Security (Trivy filesystem)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan (deps + misconfig + secrets)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,misconfig,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          skip-dirs: .venv,frontend/node_modules,data,media

  docker:
    name: Docker (Build + Scan + Smoke)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: false
          load: true
          tags: tvm:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: tvm:test
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Smoke test (container start + health)
        run: |
          docker run -d \
            -e TVM_SECRET_KEY=test-key-for-ci \
            -e TVM_APP_PASSWORD=test \
            -p 8000:8000 \
            --name tvm-test \
            tvm:test
          for i in $(seq 1 15); do
            [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/api/health)" = "200" ] && { echo "healthy after ${i}s"; exit 0; }
            sleep 1
          done
          echo "health check failed"; docker logs tvm-test; exit 1
      - name: Cleanup
        if: always()
        run: docker stop tvm-test || true

  release:
    name: Release (Push image on main + tags)
    runs-on: ubuntu-latest
    needs: [docker, security]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # Branch push -> :main (rolling). Tag push -> semver + :latest.
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
